
---
- name: Set collaborative project environment
  hosts: all
  become: yes 

  tasks:
    - name: greate sysop group with gid 3000
      group:
        name: sysops
        gid: 3000
        state: present

    - name: Create a user alice with secondary group
      user:
        name: alice
        groups: sysops
        append: yes
        state: present

    - name: Create a shared directory
      file:
        path: /common/sysadmin_pro
        state: directory
        group: sysops
        mode: '2770'

